       <body>
               
             <h1>HTML LIST</h1>
         <p>

                <u>Ordered list are list that is
                in a particular order.</u>
 
        </p>
             <ol>
                  <li>President</li>
                  <li>Vice President</li>
                  <li>Governor</li>          
                  <li>Vice governor</li>
                  <li>Mayor</li>    
                  <li>Vice Mayor</li>  
            </ol>
       
           <p>
               
                  <u>Unordered list are list that is NOT in a particular order.</u>      

           </p>
                <ul>
         
                      <li>Banana</li>
                      <li>Grapes</li>
                      <li>Guava</li>
                      <li>Apple</li>
                      <li>Strawberry</li>


               </ul>
       </body>
